<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cardo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-bg"></div>

    <div id="home-screen">
        <div id="home-content">
            <img src="https://i.imgur.com/LdZDsa0.png" id="main-enter-img" onclick="openDetail()" alt="Enter">
            <p class="guide-text">삶을 지속하는 것이야말로 고통이다.</p>
        </div>
    </div>

    <div id="detail-overlay" class="hidden">
        <header class="ui-header">
            <button class="exit-btn" onclick="closeDetail()">EXIT ✕</button>
        </header>

        <div class="ui-wrapper">
            <nav class="ui-side-tabs">
                <div class="tab active" onclick="switchTab(this, '표지')">◈ 표지</div>
                <div class="tab" onclick="switchTab(this, '속성')">◈ 속성</div>
                <div class="tab" onclick="switchTab(this, '물품')">◈ 물품</div>
                <div class="tab" onclick="switchTab(this, '문화')">◈ 문화</div>
            </nav>

            <div id="image-container" class="ui-content-area"></div>

            <aside class="ui-info-panel" id="info-panel">
                <div id="info-anim-box">
                    <h1 id="info-title">표지</h1>
                    <div class="divider"></div>
                    <div id="info-content"></div>
                </div>
            </aside>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
