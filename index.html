<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Character Document System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-bg"></div>

    <div id="home-screen">
        <div id="char-icon" onclick="openDetail()">💞</div>
        <p class="guide-text">TOUCH TO INSPECT</p>
    </div>

    <div id="detail-overlay" class="hidden">
        <header class="top-bar">
            <div class="doc-info">▤ DOCUMENT / <span id="tab-label">표지</span></div>
            <button class="close-btn" onclick="closeDetail()">EXIT ✕</button>
        </header>

        <div class="content-container">
            <nav class="side-menu">
                <div class="tab-item active" onclick="switchTab(this, '표지')">표지</div>
                <div class="tab-item" onclick="switchTab(this, '속성')">속성</div>
                <div class="tab-item" onclick="switchTab(this, '물품')">물품</div>
                <div class="tab-item" onclick="switchTab(this, '문화')">문화</div>
            </nav>

            <div class="center-stage">
                <div class="char-placeholder">이미지 영역</div>
            </div>

            <aside class="info-panel">
                <div class="info-wrapper" id="info-wrapper">
                    <h1 id="info-title">VOYAGER</h1>
                    <div class="info-line"></div>
                    <div id="info-content">
                        <p>이곳은 테스트 문구입니다.</p>
                        <p>오른쪽에서 텍스트가 나타납니다.</p>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
