<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Reverse 1999 UI Final</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-bg"></div>

    <div id="home-screen">
        <div id="home-content">
            <div id="char-icon" onclick="openDetail()">💞</div>
            <p class="guide-text">TOUCH TO INSPECT</p>
        </div>
    </div>

    <div id="detail-overlay" class="hidden">
        <header class="ui-header">
            <div class="doc-label">▤ DOCUMENT / <span id="tab-label">표지</span></div>
            <button class="exit-btn" onclick="closeDetail()">EXIT ✕</button>
        </header>

        <nav class="ui-side-tabs">
            <div class="tab active" onclick="switchTab(this, '표지')">표지</div>
            <div class="tab" onclick="switchTab(this, '속성')">속성</div>
            <div class="tab" onclick="switchTab(this, '물품')">물품</div>
            <div class="tab" onclick="switchTab(this, '문화')">문화</div>
        </nav>

        <div class="ui-center-area">
            <img src="https://via.placeholder.com/600x900/000/fff?text=CHAR+IMG" id="main-char-img">
            
            <div id="culture-book" class="hidden">
                <div class="book-page">
                    <span class="book-tag">CULTURE ARCHIVE</span>
                    <h2 class="book-title">엄청난 기적</h2>
                    <div class="book-line"></div>
                    <p class="book-desc">
                        "정말 아름다운 사진입니다."<br><br>
                        이 사건은 64만 킬로미터 떨어진 곳에서 뒤돌아보는 순간을 찍은 것이다.
                    </p>
                </div>
            </div>
        </div>

        <aside class="ui-info-panel">
            <div id="info-anim-box">
                <h1 id="info-title">VOYAGER</h1>
                <div class="divider"></div>
                <div id="info-text">이곳에 상세 내용이 출력됩니다.</div>
            </div>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
