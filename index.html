<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cardo - 폭우의 가장자리</title>
    <link rel="stylesheet" href="style.css?v=1.6">
</head>
<body>

    <div id="home-screen">
        <div id="home-content">
            <img src="https://i.imgur.com/LdZDsa0.png" id="main-enter-img" onclick="openDetail()" alt="Cardo Entrance">
            <p class="guide-text">삶을 지속하는 것이야말로 고통이다.</p>
        </div>
    </div>

    <div id="detail-overlay" class="hidden">
        <header class="ui-header">
            <button class="exit-btn" onclick="closeDetail()">EXIT ×</button>
        </header>

        <div class="ui-wrapper">
            <nav class="ui-side-tabs">
                <div class="tab" onclick="switchTab(this, '표지')">◈ 표지</div>
                <div class="tab" onclick="switchTab(this, '속성')">◈ 속성</div>
                <div class="tab" onclick="switchTab(this, '물품')">◈ 물품</div>
                <div class="tab" onclick="switchTab(this, '문화')">◈ 문화</div>
            </nav>

            <div id="image-container" class="ui-content-area"></div>

            <aside id="property-editor" class="property-panel hidden-block">
                <div class="editor-header">
                    <h1 class="editor-title">속성</h1>
                    <div class="horizontal-line"></div>
                </div>
                <div class="editor-body">
                    <p>Cardo의 상세 정보입니다.</p>
                </div>
            </aside>
        </div>
    </div>

    <script src="script.js?v=1.6"></script>
</body>
</html>
